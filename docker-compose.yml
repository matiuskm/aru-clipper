services:
  postgres:
    image: postgres:17-alpine
    container_name: clipper-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clipper
      POSTGRES_PASSWORD: clipper
      POSTGRES_DB: clipper
    ports:
      # Host 5433 -> container 5432 (avoids clashing with a local Postgres on 5432)
      - "5433:5432"
    volumes:
      - clipper_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clipper -d clipper"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clipper-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - clipper_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  clipper_pgdata:
  clipper_redisdata:
